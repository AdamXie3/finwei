<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost of Living Calculator - FinWei</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 fixed w-full z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">FinWei</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-200">Home</a>
                <a href="/lessons" class="hover:text-blue-200">Lessons</a>
                <a href="/calculator" class="hover:text-blue-200">Budget Calculator</a>
                <a href="/cost_of_living" class="hover:text-blue-200">Cost of Living Calculator</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-16">
        <section class="py-12">
            <h3 class="text-3xl font-bold text-gray-800 mb-4">Cost of Living Calculator</h3>
            <p class="text-xl text-gray-600 mb-4">Use this calculator to estimate your monthly living expenses in Dubai.</p>
            <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6 mb-8">
                <label class="block text-gray-700 mb-2" for="housing">Housing (AED)</label>
                <input type="number" id="housing" class="w-full p-2 border rounded" placeholder="Enter your housing expense">
                <label class="block text-gray-700 mb-2 mt-4" for="groceries">Groceries (AED)</label>
                <input type="number" id="groceries" class="w-full p-2 border rounded" placeholder="Enter your groceries expense">
                <label class="block text-gray-700 mb-2 mt-4" for="transportation">Transportation (AED)</label>
                <input type="number" id="transportation" class="w-full p-2 border rounded" placeholder="Enter your transportation expense">
                <button onclick="calculateCostOfLiving()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 mt-4">
                    Calculate Total
                </button>
                <div id="cost-results" class="mt-6 hidden">
                    <h4 class="font-bold text-gray-800">Estimated Monthly Costs:</h4>
                    <p id="total-cost" class="text-2xl text-blue-600"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-blue-600 text-white p-4 text-center">
        <p>&copy; 2024 FinWei. All rights reserved.</p>
        <div class="space-x-4">
            <a href="#" class="hover:text-blue-200">Privacy Policy</a>
            <a href="#" class="hover:text-blue-200">Contact Us</a>
        </div>
    </footer>

    <script>
        function calculateCostOfLiving() {
            const housing = parseFloat(document.getElementById('housing').value) || 0;
            const groceries = parseFloat(document.getElementById('groceries').value) || 0;
            const transportation = parseFloat(document.getElementById('transportation').value) || 0;

            const totalCost = housing + groceries + transportation;

            document.getElementById('total-cost').textContent = `${totalCost} AED`;
            document.getElementById('cost-results').classList.remove('hidden');
        }
    </script>
</body>
</html>
